name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "esbuild.js"
      - "biome.json"
      - "tsconfig.json"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "esbuild.js"
      - "biome.json"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false # Don't cancel other jobs if one fails
      matrix:
        # Note: Temporarily commented out due to timeout issues on free-tier runners with limited resources
        # os: [ubuntu-latest, windows-latest, macos-latest]
        os: [ubuntu-latest]
        node-version: [20.x]
        include:
          - os: ubuntu-latest
            xvfb: true
        #   - os: windows-latest
        #     playwright-deps: ""
        #     xvfb: false
        #   - os: macos-latest
        #     playwright-deps: chromium
        #     xvfb: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    env:
      TEST_WORKSPACE: ${{ github.workspace }}/test-workspace

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.15.1
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          # cache: "pnpm"

      # Install OS-specific dependencies
      # Note: Do NOT install chromium-browser via apt it installs a snap stub
      # that fails in CI containers. Puppeteer's bundled Chrome for Testing is used instead.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbfile-dev libsecret-1-0

      # Ubuntu 24.04+ ships an AppArmor profile that blocks Chrome for Testing
      # from using user namespaces. This is the same workaround used by Puppeteer's
      # own CI: https://github.com/puppeteer/puppeteer/pull/13196
      - name: Disable AppArmor user namespace restriction
        if: matrix.os == 'ubuntu-latest'
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install --cask chromium

      # Cache Puppeteer's bundled Chrome for Testing (~280MB)
      - name: Cache Puppeteer browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Create test workspace
      - name: Create test directories
        run: |
          mkdir -p test-workspace
          chmod 777 test-workspace
        shell: bash

      # Main build and test steps
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
        shell: bash

      # Run tests with OS-specific configuration
      - name: Run tests (Linux with Xvfb)
        if: matrix.xvfb
        run: xvfb-run --auto-servernum --server-args='-screen 0 1024x768x24' pnpm test
        env:
          DISPLAY: :99.0
          TEST_WORKSPACE: ${{ github.workspace }}/test-workspace

      - name: Run tests (Windows/macOS)
        if: ${{ !matrix.xvfb }}
        run: pnpm test

      - name: Build extension
        run: pnpm package

      # Artifact upload
    #   - name: Upload test results
    #     if: always()
    #     uses: actions/upload-artifact@v4
    #     with:
    #       name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}
    #       path: test-results
    #       retention-days: 7

